name: Update Pricing Data

on:
  schedule:
    # 每天 UTC 19:00 (北京时间次日凌晨3:00)
    - cron: "0 19 * * *"
  workflow_dispatch:  # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch & Build
        run: |
          cd api-pricing
          node fetch-all.js

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add api-pricing/data/ index.html
          git diff --cached --quiet && echo "No changes" || (
            git commit -m "🔄 Auto-update pricing data ($(date -u +%Y-%m-%d))"
            git push
          )
